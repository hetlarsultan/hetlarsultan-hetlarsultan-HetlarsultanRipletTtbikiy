kind = "web"
previewPath = "/"
title = "AI Video Studio Pro v2"
version = "1.0.0"
id = "artifacts/ai-video-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21370

[services.development]
run = "pnpm --filter @workspace/ai-video-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-video-studio", "run", "build" ]
publicDir = "artifacts/ai-video-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21370"
BASE_PATH = "/"
